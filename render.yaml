services:
  - type: web
    name: spirit
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python train_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/health
